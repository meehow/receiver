<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #1a1a2e;
    overflow: hidden;
  }

  .banner {
    width: 1280px;
    height: 640px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 30%, #24243e 60%, #1a1024 100%);
  }

  /* Ambient glow */
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(200, 80, 60, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(140, 60, 180, 0.06) 0%, transparent 50%);
    z-index: 1;
  }

  /* Thin diagonal accent lines */
  .line1, .line2, .line3 {
    position: absolute;
    height: 1px;
    z-index: 1;
    opacity: 0.12;
  }
  .line1 {
    width: 1600px;
    top: 160px; left: -100px;
    transform: rotate(-10deg);
    background: linear-gradient(90deg, transparent, #e85d3a 40%, #c94080 70%, transparent);
  }
  .line2 {
    width: 1400px;
    top: 400px; left: -50px;
    transform: rotate(-7deg);
    background: linear-gradient(90deg, transparent, #8b5cf6 30%, #e85d3a 60%, transparent);
  }
  .line3 {
    width: 1200px;
    top: 520px; left: 0;
    transform: rotate(-4deg);
    background: linear-gradient(90deg, transparent 10%, #e85d3a 50%, transparent);
    opacity: 0.08;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    height: 100%;
    padding: 30px 80px 0;
  }

  .left {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    padding-top: 30px;
    min-width: 560px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .brand img {
    width: 82px;
    height: 82px;
    border-radius: 20px;
    box-shadow: 0 4px 30px rgba(200, 80, 60, 0.3);
  }

  .brand-text h1 {
    font-size: 50px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }

  .brand-text .subtitle {
    font-size: 18px;
    font-weight: 600;
    color: #e85d3a;
    letter-spacing: 0.5px;
    margin-top: 5px;
  }

  .tagline {
    font-size: 22px;
    color: rgba(255, 255, 255, 0.60);
    line-height: 1.35;
    margin-bottom: 14px;
    font-weight: 400;
  }
  .tagline strong {
    color: #ffffff;
    font-weight: 600;
  }

  .badges {
    display: flex;
    gap: 12px;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.85);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .badge:nth-child(1) .dot { background: #e85d3a; }
  .badge:nth-child(2) .dot { background: #f59e0b; }
  .badge:nth-child(3) .dot { background: #8b5cf6; }

  .right {
    position: relative;
    flex-shrink: 0;
    width: 520px;
    height: 100%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 15px;
    perspective: 1200px;
  }

  .screenshot-wrapper {
    position: relative;
    width: 420px;
    transform: rotateY(-12deg) rotateX(2deg);
    transform-style: preserve-3d;
  }

  .screenshot-wrapper img {
    width: 100%;
    border-radius: 14px;
    box-shadow:
      -8px 16px 50px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(255, 255, 255, 0.08),
      -2px 4px 20px rgba(232, 93, 58, 0.08);
    object-fit: cover;
    object-position: top center;
    height: 560px;
  }

  /* Fade-out at the bottom */
  .screenshot-wrapper::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    background: linear-gradient(to top, #1a1a2e 10%, transparent);
    border-radius: 0 0 14px 14px;
    pointer-events: none;
  }

  /* Glow behind screenshot */
  .screenshot-glow {
    position: absolute;
    width: 440px;
    height: 520px;
    border-radius: 24px;
    background: radial-gradient(ellipse at center, rgba(232, 93, 58, 0.12) 0%, rgba(139, 92, 246, 0.04) 50%, transparent 75%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -52%) rotateY(-12deg);
    z-index: -1;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="line1"></div>
    <div class="line2"></div>
    <div class="line3"></div>

    <div class="content">
      <div class="left">
        <div class="brand">
          <img src="icons/hicolor/512x512/apps/io.github.meehow.Receiver.png" alt="Receiver icon">
          <div class="brand-text">
            <h1>Receiver</h1>
            <span class="subtitle">Internet Radio Player</span>
          </div>
        </div>

        <p class="tagline">
          Discover radio stations you'd<br>
          <strong>never find on your own.</strong>
        </p>

        <div class="badges">
          <div class="badge"><span class="dot"></span>30,000+ Verified Stations</div>
          <div class="badge"><span class="dot"></span>Last.fm Scrobbling</div>
          <div class="badge"><span class="dot"></span>Every Country & Genre</div>
        </div>
      </div>

      <div class="right">
        <div class="screenshot-glow"></div>
        <div class="screenshot-wrapper">
          <img src="rec1.png" alt="Receiver screenshot">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
