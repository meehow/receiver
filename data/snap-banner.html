<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  Promo banner. Render at two sizes, no cropping needed:
    GitHub social preview (2:1):
      chromium --headless --hide-scrollbars --window-size=1280,640 --screenshot=... this file
    Snapcraft featured banner (3:1):
      chromium --headless --hide-scrollbars --window-size=1280,427 --screenshot=... this file
  A media query switches to a compact layout below 550px viewport height.
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #14101f;
    overflow: hidden;
  }

  .banner {
    width: 1280px;
    height: 640px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 900px 600px at 18% 40%, rgba(244, 107, 69, 0.14) 0%, transparent 60%),
      radial-gradient(ellipse 1000px 700px at 85% 60%, rgba(123, 47, 247, 0.20) 0%, transparent 65%),
      linear-gradient(135deg, #1b1226 0%, #14101f 45%, #170f2b 100%);
  }

  /* Broadcast waves radiating from the icon's antenna */
  .wave {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid;
    left: 385px;
    top: 208px;
    transform: translate(-50%, -50%);
  }
  .wave:nth-child(1) { width: 520px;  height: 520px;  border-color: rgba(244, 107, 69, 0.16); }
  .wave:nth-child(2) { width: 780px;  height: 780px;  border-color: rgba(215, 90, 130, 0.11); }
  .wave:nth-child(3) { width: 1080px; height: 1080px; border-color: rgba(123, 47, 247, 0.13); }
  .wave:nth-child(4) { width: 1420px; height: 1420px; border-color: rgba(123, 47, 247, 0.08); }

  /* Decorative equalizer along the bottom edge (safe to lose in a 3:1 crop) */
  .eq {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 105px;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    padding: 0 40px;
    opacity: 0.35;
  }
  .eq span {
    flex: 1;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(to top, rgba(244, 107, 69, 0.55), rgba(168, 85, 247, 0.35));
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 72px;
    padding: 0 70px;
  }

  .icon {
    flex-shrink: 0;
    width: 300px;
    height: 300px;
    filter: drop-shadow(0 18px 45px rgba(0, 0, 0, 0.55));
  }
  .icon svg { width: 100%; height: 100%; }

  .text { max-width: 640px; }

  .text h1 {
    font-size: 98px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -3px;
    line-height: 1;
  }

  .subtitle {
    display: inline-block;
    margin-top: 10px;
    font-size: 21px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #f4885f, #c95fd0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .tagline {
    margin-top: 22px;
    font-size: 27px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.62);
    line-height: 1.35;
  }
  .tagline strong {
    color: #ffffff;
    font-weight: 600;
  }

  .badges {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 19px;
    border-radius: 100px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.88);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .badge:nth-child(1) .dot { background: #f46b45; }
  .badge:nth-child(2) .dot { background: #f0a13c; }
  .badge:nth-child(3) .dot { background: #a56ef5; }

  /* Compact 3:1 layout (Snapcraft featured banner, 1280x427) */
  @media (max-height: 550px) {
    .banner { height: 427px; }
    .wave { left: 400px; top: 145px; }
    .eq { height: 70px; }
    .content { gap: 56px; padding-bottom: 30px; }
    .icon { width: 210px; height: 210px; }
    .text h1 { font-size: 68px; letter-spacing: -2px; }
    .subtitle { font-size: 16px; letter-spacing: 5px; margin-top: 7px; }
    .tagline { font-size: 21px; margin-top: 14px; }
    .badges { margin-top: 18px; }
    .badge { font-size: 12px; padding: 7px 15px; }
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>

    <div class="eq">
      <span style="height:34%"></span><span style="height:58%"></span><span style="height:42%"></span><span style="height:76%"></span><span style="height:51%"></span><span style="height:88%"></span><span style="height:63%"></span><span style="height:37%"></span><span style="height:70%"></span><span style="height:47%"></span><span style="height:82%"></span><span style="height:55%"></span><span style="height:39%"></span><span style="height:66%"></span><span style="height:49%"></span><span style="height:74%"></span><span style="height:44%"></span><span style="height:60%"></span><span style="height:35%"></span><span style="height:68%"></span><span style="height:52%"></span><span style="height:79%"></span><span style="height:46%"></span><span style="height:62%"></span><span style="height:40%"></span><span style="height:72%"></span><span style="height:57%"></span><span style="height:36%"></span>
    </div>

    <div class="content">
      <div class="icon">
        <!-- App icon, inlined from data/icons/hicolor/scalable/apps/io.github.meehow.Receiver.svg -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f46b45"/>
              <stop offset="100%" stop-color="#7b2ff7"/>
            </linearGradient>
            <linearGradient id="bodyLight" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
              <stop offset="14%" stop-color="#ffffff" stop-opacity="0"/>
              <stop offset="82%" stop-color="#000000" stop-opacity="0"/>
              <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
            </linearGradient>
          </defs>
          <line x1="72" y1="48" x2="99" y2="19" stroke="#452d62" stroke-width="5" stroke-linecap="round"/>
          <circle cx="99" cy="19" r="4.5" fill="#452d62"/>
          <g fill="none" stroke-linecap="round" stroke-width="3.5">
            <path d="M 101.6 10.9 A 8.5 8.5 0 0 1 107.1 16.4" stroke="#f46b45"/>
            <path d="M 103.3 5.7 A 14 14 0 0 1 112.3 14.7" stroke="#f9a175"/>
          </g>
          <rect x="12.5" y="42" width="103" height="73.5" rx="15" fill="url(#bg)"/>
          <rect x="12.5" y="42" width="103" height="73.5" rx="15" fill="url(#bodyLight)"/>
          <circle cx="44" cy="78.5" r="23.5" fill="#fff6ee"/>
          <circle cx="44" cy="78.5" r="16.5" fill="url(#bg)"/>
          <circle cx="44" cy="78.5" r="10" fill="#fff6ee"/>
          <circle cx="44" cy="78.5" r="4.5" fill="url(#bg)"/>
          <rect x="73" y="56.5" width="33" height="9" rx="4.5" fill="#fff6ee"/>
          <rect x="86" y="54.5" width="3" height="13" rx="1.5" fill="#452d62"/>
          <circle cx="81" cy="92" r="7.5" fill="#fff6ee"/>
          <circle cx="81" cy="92" r="3.5" fill="url(#bg)"/>
          <circle cx="99" cy="92" r="7.5" fill="#fff6ee"/>
          <circle cx="99" cy="92" r="3.5" fill="url(#bg)"/>
        </svg>
      </div>

      <div class="text">
        <h1>Receiver</h1>
        <span class="subtitle">Internet Radio</span>
        <p class="tagline">
          Discover radio stations you'd<br>
          <strong>never find on your own.</strong>
        </p>
        <div class="badges">
          <div class="badge"><span class="dot"></span>30,000+ verified stations</div>
          <div class="badge"><span class="dot"></span>No ads &middot; no sign-up</div>
          <div class="badge"><span class="dot"></span>Last.fm scrobbling</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
